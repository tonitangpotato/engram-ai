# Layer 1: Core components (depend on types)
# [FINDING-3 applied: synth-cluster split into core + emotional]
- id: synth-cluster-core
  title: "Implement cluster discovery core (src/synthesis/cluster.rs)"
  status: todo
  tags: [iss-005, knowledge-synthesis, GOAL-1]
  metadata:
    estimated_loc: 250
  description: |
    Implement core cluster discovery from design §2 (excluding §2.4 emotional modulation):
    - compute_pairwise_signals(storage, candidates) → Vec<(id, id, PairwiseSignals)>
      * Query hebbian_links for signal 1
      * Query memory_entities for signal 2 (Jaccard overlap)
      * Use find_nearest_embedding for signal 3
      * Compute temporal proximity (exp decay with half-life) for signal 4
    - compute_composite_score(signals, weights) → f64
    - discover_clusters(storage, config) → Vec<MemoryCluster>
      * Pre-filter candidates (§2.5): access_count > 0, not is_synthesis, importance >= min
      * Build edge list where composite score >= threshold
      * Connected components algorithm
      * Split clusters > max_cluster_size (higher threshold recursion)
      * Discard clusters < min_cluster_size
      * Compute quality_score, centroid_id, signals_summary per cluster

    ⚠️ Performance: naive all-pairs scoring is O(n²). Optimize: only score pairs
    connected by ≥1 signal (Hebbian link exists OR shared entity). Build candidate
    pairs from signal sources, not from full cross-product. Target: SC-4 requires
    <60s for 10K memories. [FINDING-15]

    Files: src/synthesis/cluster.rs (new, ~250 lines)
    Acceptance: Unit tests pass for pairwise scoring, connected components, candidate filtering, cluster splitting.
    Depends on: synth-types, entity indexing (B1) for entity overlap queries.

- id: synth-cluster-emotional
  title: "Implement emotional modulation for clusters"
  status: todo
  tags: [iss-005, knowledge-synthesis, GOAL-1]
  metadata:
    estimated_loc: 80
  description: |
    Implement emotional modulation from design §2.4 (separate from core clustering):
    - apply_emotional_modulation(clusters, config) → Vec<MemoryCluster>
      * Boost scoring for emotional memories (EmotionalModulationConfig)
      * Sort clusters by emotional salience then quality
      * Flag clusters with emotional context for prompt inclusion
    Uses EmotionalModulationConfig from synth-types.

    Files: src/synthesis/cluster.rs (+80 lines, appended to core)
    Acceptance: Unit tests cover emotional boost calculation, priority sorting, config off = no-op.

- id: synth-gate
  title: "Implement gate check (src/synthesis/gate.rs)"
  status: todo
  tags: [iss-005, knowledge-synthesis, GOAL-3]
  metadata:
    estimated_loc: 250
  description: |
    Implement gate decision logic from design §3:
    - check_gate(cluster, members, config, storage) → GateResult
      * Rule 1: < min_cluster_size → SKIP
      * Rule 2: all embeddings > 0.92 similarity → AUTO-UPDATE(MergeDuplicates)
      * Rule 3: quality < gate_quality_threshold → SKIP
      * Rule 4: min-size + low quality → DEFER
      * Rule 5: ≥80% members already covered (query synthesis_provenance) → SKIP
      * Rule 6: cluster unchanged since last attempt (compare cluster ID) → SKIP
      * Rule 7: < 2 MemoryTypes → SKIP (except all-Factual or all-Episodic with high entity overlap)
      * Rule 8: cost > threshold AND quality < premium → SKIP
      * Rule 9: else → SYNTHESIZE
    - estimate_cost(members) → f64 (token count / 4 * price_per_token)
    - check_already_covered(storage, cluster) → bool
    - check_cluster_growth(storage, cluster) → bool
    - GateScores computation

    Note: gate receives a MemoryCluster struct — it does NOT call clustering functions.
    Only needs types, not cluster.rs. [FINDING-9]

    Files: src/synthesis/gate.rs (new, ~250 lines)
    Acceptance: Unit tests cover all 9 decision paths. Each rule tested independently.

# [FINDING-2 applied: LLM provider interface defined]
# [FINDING-8 applied: store_insight removed, storage happens in engine]
- id: synth-insight
  title: "Implement insight generation (src/synthesis/insight.rs)"
  status: todo
  tags: [iss-005, knowledge-synthesis, GOAL-2]
  metadata:
    estimated_loc: 280
  description: |
    Implement LLM insight generation from design §4.

    LLM Provider Interface [FINDING-2]:
    Define a `SynthesisLlmProvider` trait:
      pub trait SynthesisLlmProvider: Send + Sync {
          fn generate(&self, prompt: &str, config: &SynthesisConfig) -> Result<String>;
      }
    This is NOT the same as MemoryExtractor (extractor does structured fact extraction,
    not open-ended synthesis). DefaultSynthesisEngine holds Option<Box<dyn SynthesisLlmProvider>>.
    When None, insight generation is skipped per §9 LLM Graceful Degradation.

    Functions (pure logic — NO storage calls) [FINDING-8]:
    - build_prompt(cluster, members, config) → String
      * Select PromptTemplate based on dominant MemoryType
      * Format memory list with emotional context if enabled
      * Include JSON schema in prompt
    - call_llm(prompt, provider, config) → Result<String>
    - validate_output(output, cluster, members) → Result<SynthesisOutput>
      * 7 validation checks from §4.3:
        1. source_ids all in cluster members
        2. confidence in 0.0-1.0
        3. insight_text not empty, differs from sources
        4. valid InsightType
        5. length 50-500 chars
        6. centroid similarity > 0.4
        7. fail → log, don't store, don't demote
    - compute_insight_importance(output, cluster) → f64

    Note: store_insight() is NOT in this module. Storage happens in synth-engine's
    transaction (insight + provenance + demotion = one atomic commit per GUARD-1).
    This module only exposes pure functions: build_prompt, call_llm, validate_output,
    compute_insight_importance.

    Files: src/synthesis/insight.rs (new, ~280 lines)
    Acceptance: Tests cover prompt construction per template, all 7 validation checks (pass+fail), importance calculation.

# [FINDING-4 applied: clarified storage vs business logic boundary]
# [FINDING-12 applied: provenance table migration explicit]
- id: synth-provenance
  title: "Implement provenance tracing (src/synthesis/provenance.rs + storage.rs)"
  status: todo
  tags: [iss-005, knowledge-synthesis, GOAL-4]
  metadata:
    estimated_loc: 290
  description: |
    Implement provenance from design §5.

    Storage layer (add to src/storage.rs) [FINDING-4, FINDING-12]:
    All SQL lives in storage.rs, consistent with existing pattern.
    - Add `CREATE TABLE IF NOT EXISTS synthesis_provenance (...)` to Storage::init()
      or a migration function. Table schema from §5.1. Include indices on insight_id
      and source_id for O(1) lookups (GOAL-4). Idempotent (CREATE IF NOT EXISTS). [FINDING-12]
    - record_provenance(insight_id, source_ids, cluster_id, gate_scores, confidence) → Result<()>
    - get_insight_sources(insight_id) → Vec<ProvenanceRecord>
    - get_memory_insights(source_id) → Vec<ProvenanceRecord>
    - get_provenance_chain(memory_id, max_depth) → ProvenanceChain

    Business logic (src/synthesis/provenance.rs) [FINDING-4]:
    Orchestration logic that calls multiple storage methods.
    - undo_synthesis(storage, insight_id) → Result<UndoSynthesis>
      * Look up provenance records (via storage method)
      * Restore source importance from source_original_importance
      * Delete insight MemoryRecord
      * Delete provenance records
      * All in one transaction (calls storage transactionally)
    provenance.rs calls storage methods, NOT raw SQL.

    Files: src/synthesis/provenance.rs (new, ~200 lines), src/storage.rs (+90 lines for table + CRUD)
    Acceptance: Tests cover record/query/undo cycle. Transaction rollback tested. Table creation idempotent.

# Layer 2: Engine integration (depends on all core components)
# [FINDING-5 applied: stronger acceptance criteria]
# [FINDING-8 applied: engine owns storage transaction]
# [FINDING-11 applied: LLM graceful degradation explicit]
# [FINDING-13 applied: GUARD-1 transaction semantics explicit]
- id: synth-engine
  title: "Implement SynthesisEngine trait (src/synthesis/engine.rs)"
  status: todo
  tags: [iss-005, knowledge-synthesis, integration]
  metadata:
    estimated_loc: 300
  description: |
    Implement the SynthesisEngine trait from design §7:
    - struct DefaultSynthesisEngine implementing SynthesisEngine trait
    - Constructor takes Option<Box<dyn SynthesisLlmProvider>> [FINDING-2]
    - synthesize() orchestrates the full pipeline:
      1. discover_clusters()
      2. apply_emotional_modulation()
      3. Sort clusters by priority (emotional → size → temporal spread)
      4. Budget enforcement: track llm_calls_remaining, cap at max_llm_calls_per_run
      5. For each cluster (up to budget):
         a. check_gate()
         b. If SYNTHESIZE: generate_insight(), record_provenance(), demote_sources()
         c. If AUTO-UPDATE: execute merge/strengthen action
         d. If DEFER/SKIP: log in report
      6. Build and return SynthesisReport

    GUARD-1 Transaction Semantics [FINDING-13]:
    Each insight creation is a single SQLite transaction:
      BEGIN → insert insight MemoryRecord → insert provenance records →
      update source importances (demotion) → COMMIT.
    If any step fails, ROLLBACK — no partial state. This is GUARD-1's core invariant.
    The engine owns storage calls for insight creation (NOT synth-insight module).

    Source demotion: importance *= demotion_factor (inside same transaction).
    Error handling: each cluster in try block, errors collected in report, no partial state.
    max_insights_per_consolidation rate limit.

    LLM Graceful Degradation [FINDING-11]:
    When LLM provider is None:
    - discover_clusters() + check_gate() still run normally
    - synthesize() phase is skipped (not errored)
    - SynthesisReport indicates 0 insights with reason "LlmUnavailable"
    - Warning logged: "Synthesis LLM not configured, skipping insight generation"
    This satisfies requirements §6.F.

    Files: src/synthesis/engine.rs (new, ~300 lines)
    Acceptance:
    - cargo check passes with all components wired
    - Inline #[cfg(test)] test: create DefaultSynthesisEngine with mock LLM,
      feed 2 clusters (one SYNTHESIZE, one SKIP), verify report counts [FINDING-5]
    - Inline test: engine with None LLM provider → report shows 0 insights, no error [FINDING-11]
    - Inline test: transaction rollback on LLM failure → no partial state [FINDING-13]

# [FINDING-6 applied: corrected GUARD-3 reference]
- id: synth-consolidate
  title: "Integrate synthesis into consolidate() call path"
  status: todo
  tags: [iss-005, knowledge-synthesis, integration]
  metadata:
    estimated_loc: 70
  description: |
    Wire SynthesisEngine into the existing consolidate() in memory.rs:
    - Add synthesis_settings field to MemoryConfig and MemorySystem
    - In consolidate(): after existing Hebbian strengthening, if synthesis enabled:
      * Create DefaultSynthesisEngine (pass LLM provider from Memory struct if available)
      * Call synthesize()
      * Return SynthesisReport as part of consolidation result
    - Opt-in: synthesis only runs if config.synthesis_settings.enabled == true
      (GUARD-3: Backward Compatibility — see master requirements.md, NOT engine requirements) [FINDING-6]
    - Ensure provenance table is created in init_tables() (handled by synth-provenance, verify wiring)
    Files: src/memory.rs (+50 lines), src/config.rs (+20 lines SynthesisSettings default)
    Acceptance: consolidate() with synthesis disabled = no change. With enabled = runs synthesis.

# Layer 3: Incremental operations
# [FINDING-10 applied: added gate dependency]
- id: synth-incremental
  title: "Implement incremental operations (cluster updates on new memory)"
  status: todo
  tags: [iss-005, knowledge-synthesis, incremental]
  metadata:
    estimated_loc: 130
  description: |
    Implement incremental cluster operations from design §6:
    - score_against_existing_clusters(new_memory, existing_clusters, storage) → Option<cluster_id>
      * Compute cluster-fit score for new memory against each cluster
      * If fit >= threshold, assign to best cluster
    - detect_staleness(cluster, old_cluster, config) → bool
      * ≥50% member change OR quality_score delta > 0.2
    - flag_stale_provenance(storage, cluster_id) → Result<()>
      * Mark provenance records with stale flag
    - Trigger gate re-evaluation on updated clusters [FINDING-10]:
      When a cluster is updated (new member added or staleness detected),
      call check_gate() to re-decide whether re-synthesis is needed.
    - Update discover_clusters() to load existing clusters and handle incremental additions
    Files: src/synthesis/cluster.rs (+100 lines), src/synthesis/provenance.rs (+30 lines)
    Acceptance: Test new memory joins cluster, staleness detection triggers re-synthesis eligibility,
    gate re-evaluation runs on updated cluster.

