  title: "Write unit tests for all synthesis components (inline #[cfg(test)])"
  status: todo
  tags: [iss-005, knowledge-synthesis, tests]
  metadata:
    estimated_loc: 400
  description: |
    Add #[cfg(test)] mod tests sections to each existing synthesis source file.
    This is NOT a separate test file — tests live inside the modules created by
    synth-cluster-core, synth-gate, synth-insight, synth-provenance. [FINDING-16]

    Test count targets [FINDING-7]:
    - types.rs: serialization roundtrip, default values (~4 tests)
    - cluster.rs: pairwise scoring (4 signal types), connected components,
      candidate filtering (4 conditions), cluster splitting, discard (~12 tests)
    - gate.rs: all 9 decision paths + 2 exception cases (Rule 7) + cost estimation
      + already-covered + cluster-growth (~14 tests)
    - insight.rs: prompt construction per template (3 types), all 7 validation checks
      × (pass+fail), importance calculation (~18 tests)
    - provenance.rs: record/query/undo, chain traversal depth 1 + depth 3,
      transaction rollback (~6 tests)
    Total floor: ~54 unit tests

    Files: #[cfg(test)] sections in each src/synthesis/*.rs file
    Acceptance: cargo test -- synthesis passes, ≥50 tests, all 9 gate paths + 7 validation checks covered.

- id: synth-integration-tests
  title: "Write integration tests for full synthesis pipeline"
  status: todo
  tags: [iss-005, knowledge-synthesis, tests]
  metadata:
    estimated_loc: 300
  description: |
    End-to-end integration tests:
    - Test full pipeline: add memories → consolidate with synthesis → verify insights created
    - Test budget enforcement: set max_llm_calls=2, give 5 clusters → only 2 synthesized
    - Test undo: synthesize → undo → verify sources restored, insight gone
    - Test incremental: synthesize → add new memory → re-consolidate → verify cluster updated
    - Test disabled: synthesis disabled → consolidate runs without synthesis
      (GUARD-3: Backward Compatibility, master requirements.md)
    - Test provenance queries: bidirectional lookup, chain traversal
    - Test LLM unavailable: engine with None provider → clusters discovered, gate runs,
      no insights, report indicates LlmUnavailable [FINDING-11]
    Uses mock/test LLM provider that returns canned responses.
    Files: tests/synthesis_integration_test.rs (new, ~300 lines)
    Acceptance: All integration tests pass.

