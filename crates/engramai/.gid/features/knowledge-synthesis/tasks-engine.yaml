  description: |
    Create src/synthesis/types.rs with all type definitions from design §2-§7:
    - ClusterWeights, PairwiseSignals, SignalsSummary, ClusterSignal
    - MemoryCluster, ClusterDiscoveryConfig, EmotionalModulationConfig
    - GateDecision, AutoUpdateAction, GateConfig, GateResult, GateScores
