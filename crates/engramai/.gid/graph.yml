    - 多 domain 交叉: coding + trading 同时产生信号
    - 滑动窗口趋势检测
    - Memory.interoceptive_snapshot() 端到端

    文件: src/interoceptive/types.rs (#[cfg(test)]), src/interoceptive/hub.rs (#[cfg(test)]), tests/interoceptive_test.rs (新)
