- id: intero-types
  title: 'Phase 1: 统一信号类型 (InteroceptiveSignal + types)'
  status: done
  description: |-
    定义 InteroceptiveSignal 统一信号格式 + SignalSource enum + SignalContext。所有信号源的公共输出接口。包含：
    - InteroceptiveSignal struct (source, domain, valence, arousal, timestamp, context)
    - SignalSource enum (Anomaly, Feedback, Alignment, Confidence, Accumulator)
    - SignalContext enum (触发信号的上下文)
    - InteroceptiveState struct (domain_states, global_arousal, somatic_cache, signal_buffer)
    - DomainState struct (valence_trend, anomaly_level, action_success_rate, alignment_score, confidence)
    - RegulationAction enum (SoulUpdateSuggestion, RetrievalAdjustment, BehaviorShift, Alert)
    - SomaticMarker struct

    文件: src/interoceptive/types.rs (~120 行)
    设计参考: INTEROCEPTIVE-LAYER.md §5.2
  tags:
  - interoceptive
  - phase-1
  priority: 20
- id: intero-mod
  title: 'Phase 1: 模块脚手架 (mod.rs + lib.rs)'
  status: done
  description: |-
    创建 src/interoceptive/mod.rs，导出 types + hub 模块。在 lib.rs 加 pub mod interoceptive。

    文件: src/interoceptive/mod.rs (新), lib.rs (+1 行)
  tags:
  - interoceptive
  - phase-1
  priority: 20
- id: intero-signal-adapters
  title: 'Phase 1: 信号适配器 (5 个模块 → InteroceptiveSignal)'
  status: done
  description: |-
    给现有 5 个信号源模块各加一个方法输出 InteroceptiveSignal 格式，不改变原有行为：

    1. anomaly.rs — BaselineTracker::to_signal() → InteroceptiveSignal (source=Anomaly, valence=-z_score_normalized, arousal=abs(z_score)/threshold)
    2. bus/accumulator.rs — EmotionalAccumulator::to_signal(domain) → InteroceptiveSignal (source=Accumulator, valence=trend_valence)
    3. bus/feedback.rs — BehaviorFeedback::to_signal(action) → InteroceptiveSignal (source=Feedback, valence=success_rate*2-1)
    4. confidence.rs — ConfidenceScorer::to_signal() → InteroceptiveSignal (source=Confidence, valence=combined_confidence*2-1)
    5. bus/alignment.rs — AlignmentScorer::to_signal() → InteroceptiveSignal (source=Alignment, valence=alignment_score*2-1)

    每个约 15-20 行。纯 additive，不改现有行为。
    设计参考: INTEROCEPTIVE-LAYER.md §6.1-6.5
  tags:
  - interoceptive
  - phase-1
  priority: 30
- id: intero-hub
  title: 'Phase 2: InteroceptiveHub 核心 (信号整合 + 状态聚合)'
  status: done
  description: |-
    InteroceptiveHub 核心实现 (~300-400 行)：

    核心职责：
    - 接收 InteroceptiveSignal，维护 signal_buffer (VecDeque, 滑动窗口)
    - 维护 domain_states: HashMap<String, DomainState>，每次信号更新对应 domain 的状态
    - 计算 global_arousal (所有 domain arousal 的加权平均)
    - Somatic marker 缓存: 情境 hash → 历史情感记录 (Damasio 直觉)
    - current_state() → InteroceptiveState 快照
    - process_signal(signal) → Option<RegulationAction>
    - tick() — 被定时调用，从所有信号源拉取最新信号，更新状态

    关键设计约束：
    - O(1) 或 O(log n)，不能成为瓶颈
    - signal_buffer 上限 1000，超出 FIFO 淘汰
    - somatic_cache LRU 淘汰

    文件: src/interoceptive/hub.rs (~400 行)
    设计参考: INTEROCEPTIVE-LAYER.md §5.1-5.2
  tags:
  - interoceptive
  - phase-2
  priority: 30
- id: intero-memory-api
  title: 'Phase 2: Memory API (interoceptive_snapshot + tick)'
  status: done
  description: |-
    在 Memory 上加 interoceptive_snapshot() 方法：

    1. Memory struct 新增 interoceptive_hub: Option<InteroceptiveHub> 字段
    2. Memory::new() 初始化 hub (读取现有模块状态)
    3. Memory::interoceptive_snapshot() → InteroceptiveState
    4. Memory::interoceptive_tick() — 拉取所有信号源，更新 hub 状态
    5. Memory::interoceptive_regulate() → Vec<RegulationAction> — 获取调节建议

    关键：hub 拿到的信号源引用来自 Memory 已有的 emotional_bus (accumulator, feedback, alignment) + anomaly_tracker + confidence_scorer。

    文件: src/memory.rs (+60 行)
    设计参考: INTEROCEPTIVE-LAYER.md §10
  tags:
  - interoceptive
  - phase-2
  priority: 40
- id: intero-regulation
  title: 'Phase 4: 调节层 (RegulationAction 生成规则)'
  status: done
  description: |-
    基于 InteroceptiveState 生成 RegulationAction 的逻辑：

    规则引擎 (不用 LLM)：
    1. 情感趋势持续负向 (valence < -0.3 持续 5+ 信号) → SoulUpdateSuggestion
    2. confidence 持续低 (< 0.4 持续 3+ 信号) → RetrievalAdjustment { expand_search: true }
    3. 某 action 成功率 < 0.3 → BehaviorShift { action, recommendation }
    4. 多个 domain 同时 anomaly_level > 2.0 → Alert { severity: High }
    5. alignment < 0.3 持续 → SoulUpdateSuggestion

    Regulation 的输出只是建议，不自动执行。由调用方（RustClaw hooks）决定是否采纳。

    文件: src/interoceptive/regulation.rs (~150 行)
    设计参考: INTEROCEPTIVE-LAYER.md §5.2 Layer 3
  tags:
  - interoceptive
  - phase-4
  priority: 50
- id: intero-broadcast
  title: 'Phase 3: 广播机制 (SessionWorkingMemory → Hub)'
  status: done
  description: |-
    SessionWorkingMemory 加入广播机制 (GWT 实现)：

    - admit_with_broadcast() — 记忆进入工作记忆时广播到 hub
    - hub.process_admission(memory_id) — 触发情感着色 + 对齐检查 + 异常检测
    - Spreading activation via Hebbian neighbors (如果 hebbian network 可用)

    注意：这是对 session_wm.rs 的改造，需要小心不破坏现有 admit/evict 逻辑。

    文件: src/session_wm.rs (+50 行)
    设计参考: INTEROCEPTIVE-LAYER.md §5.3
  tags:
  - interoceptive
  - phase-3
  priority: 50
- id: intero-rustclaw-integration
  title: 'Phase 5: RustClaw 集成 (hooks + tick + 闭环)'
  status: done
  description: |-
    RustClaw 侧集成：

    1. EngramRecallHook (BeforeInbound) — recall 时同时调用 hub.current_state()，内感受状态注入 system prompt
    2. EngramStoreHook (BeforeOutbound) — 存储后调用 hub.process()，信号层各自检测 + 整合层更新
    3. 后台 tick — 定时 (每 5 分钟或每次 heartbeat) 调用 memory.interoceptive_tick()
    4. RegulationAction 处理 — 调节层输出发到 Telegram 或写入日志

    文件: rustclaw/src/engram_hooks.rs (+40 行), 可能新增 interoceptive 相关 hook
    设计参考: INTEROCEPTIVE-LAYER.md §10.1-10.5
  tags:
  - interoceptive
  - phase-5
  - rustclaw
  priority: 60
- id: intero-tests
