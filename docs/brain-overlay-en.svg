<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1408 768" font-family="'SF Pro Display','Inter',-apple-system,sans-serif">
<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
  <filter id="cardShadow">
    <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.85"/>
  </filter>
  <filter id="titleGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="4" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    .d1 { animation: pulse 3s ease-in-out infinite; }
    .d2 { animation: pulse 3s ease-in-out 0.8s infinite; }
    .d3 { animation: pulse 3s ease-in-out 1.6s infinite; }
  </style>
</defs>

<!-- Base brain image -->
<image href="brain-base.png" x="0" y="0" width="1408" height="768"/>
<rect width="1408" height="768" fill="#000" opacity="0.5"/>

<!-- Title -->
<text x="704" y="38" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="700" filter="url(#titleGlow)">engram — Brain-Inspired Memory Architecture</text>

<!-- ============================================ -->
<!-- REGION MARKERS — corrected anatomical coords -->
<!-- Brain bbox: x=[240,1375], y=[0,767], facing left -->
<!-- ============================================ -->

<!-- 1. PFC — frontal pole, far anterior -->
<circle cx="330" cy="268" r="22" fill="#ff6b9d" opacity="0.12" filter="url(#glow)"/>
<circle cx="330" cy="268" r="6" fill="#ff6b9d" opacity="0.9" class="d1"/>

<!-- 2. OFC — ventral frontal, below PFC -->
<circle cx="376" cy="421" r="18" fill="#fb923c" opacity="0.12" filter="url(#glow)"/>
<circle cx="376" cy="421" r="5" fill="#fb923c" opacity="0.9" class="d2"/>

<!-- 3. ACC — above corpus callosum, anterior -->
<circle cx="523" cy="230" r="18" fill="#facc15" opacity="0.12" filter="url(#glow)"/>
<circle cx="523" cy="230" r="5" fill="#facc15" opacity="0.9" class="d3"/>

<!-- 4. Thalamus — deep center of brain -->
<circle cx="716" cy="398" r="24" fill="#4dc9f6" opacity="0.12" filter="url(#glow)"/>
<circle cx="716" cy="398" r="6" fill="#4dc9f6" opacity="0.9" class="d1"/>

<!-- 5. Hippocampus — medial temporal, posterior-inferior to thalamus, below splenium -->
<circle cx="770" cy="430" r="20" fill="#34d399" opacity="0.12" filter="url(#glow)"/>
<circle cx="770" cy="430" r="6" fill="#34d399" opacity="0.9" class="d2"/>

<!-- 6. Amygdala — anterior to hippocampus, same depth -->
<circle cx="637" cy="475" r="16" fill="#f87171" opacity="0.12" filter="url(#glow)"/>
<circle cx="637" cy="475" r="5" fill="#f87171" opacity="0.9" class="d3"/>

<!-- 7. Basal Ganglia — lateral to thalamus, slightly anterior and above -->
<circle cx="637" cy="345" r="16" fill="#a855f7" opacity="0.1" filter="url(#glow)"/>
<circle cx="637" cy="345" r="5" fill="#a855f7" opacity="0.9" class="d1"/>

<!-- 8. Temporal association cortex — inferior temporal, below sylvian -->
<circle cx="580" cy="536" r="16" fill="#22d3ee" opacity="0.1" filter="url(#glow)"/>
<circle cx="580" cy="536" r="5" fill="#22d3ee" opacity="0.9" class="d2"/>

<!-- 9. VTA — ventral midbrain, above pons -->
<circle cx="730" cy="480" r="14" fill="#fbbf24" opacity="0.12" filter="url(#glow)"/>
<circle cx="730" cy="480" r="5" fill="#fbbf24" opacity="0.9" class="d3"/>

<!-- 10. LC — inside dorsal pons -->
<circle cx="790" cy="530" r="12" fill="#2dd4bf" opacity="0.1" filter="url(#glow)"/>
<circle cx="790" cy="530" r="4" fill="#2dd4bf" opacity="0.85" class="d1"/>

<!-- 11. Cerebellum — posterior-inferior -->
<circle cx="1057" cy="575" r="20" fill="#e879f9" opacity="0.08" filter="url(#glow)"/>
<circle cx="1057" cy="575" r="6" fill="#e879f9" opacity="0.8" class="d2"/>

<!-- ============================================ -->
<!-- LEFT LABELS                                  -->
<!-- ============================================ -->

<!-- PFC -->
<g filter="url(#cardShadow)">
  <rect x="8" y="62" width="256" height="62" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#ff6b9d" stroke-width="1"/>
  <text x="20" y="80" fill="#ff6b9d" font-size="11.5" font-weight="700">Prefrontal Cortex (PFC)</text>
  <text x="20" y="95" fill="#e2e8f0" font-size="8.5">Higher cognition: fragments → coherent insights</text>
  <text x="20" y="109" fill="#c4b5fd" font-size="7.5">engram: SynthesisEngine 4-stage pipeline</text>
  <text x="20" y="119" fill="#c4b5fd" font-size="7">cluster() → gate() → insight() → provenance()</text>
</g>
<line x1="264" y1="93" x2="326" y2="264" stroke="#ff6b9d" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- ACC -->
<g filter="url(#cardShadow)">
  <rect x="8" y="136" width="256" height="55" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#facc15" stroke-width="1"/>
  <text x="20" y="154" fill="#facc15" font-size="11.5" font-weight="700">Anterior Cingulate (ACC)</text>
  <text x="20" y="169" fill="#e2e8f0" font-size="8.5">Metacognition: "How confident am I?"</text>
  <text x="20" y="183" fill="#c4b5fd" font-size="7.5">engram: confidence_score()</text>
  <text x="20" y="188" fill="#c4b5fd" font-size="6.5">  = type_reliability() × content_reliability() × retrieval_salience()</text>
</g>
<line x1="264" y1="162" x2="519" y2="228" stroke="#facc15" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- Basal Ganglia -->
<g filter="url(#cardShadow)">
  <rect x="8" y="203" width="256" height="55" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#a855f7" stroke-width="1"/>
  <text x="20" y="221" fill="#a855f7" font-size="11.5" font-weight="700">Basal Ganglia</text>
  <text x="20" y="236" fill="#e2e8f0" font-size="8.5">Behavioral feedback: track action success/failure</text>
  <text x="20" y="250" fill="#c4b5fd" font-size="7.5">engram: BehaviorTracker.log_outcome()</text>
  <text x="20" y="255" fill="#c4b5fd" font-size="6.5">  get_action_stats() → soul_suggestions()</text>
</g>
<line x1="264" y1="230" x2="633" y2="342" stroke="#a855f7" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- OFC -->
<g filter="url(#cardShadow)">
  <rect x="8" y="318" width="256" height="55" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#fb923c" stroke-width="1"/>
  <text x="20" y="336" fill="#fb923c" font-size="11.5" font-weight="700">Orbitofrontal Cortex (OFC)</text>
  <text x="20" y="351" fill="#e2e8f0" font-size="8.5">Value judgment: aligned with my goals?</text>
  <text x="20" y="365" fill="#c4b5fd" font-size="7.5">engram: score_alignment_hybrid()</text>
  <text x="20" y="370" fill="#c4b5fd" font-size="6.5">  = max(keyword_match, cosine(drive_embed, content_embed))</text>
</g>
<line x1="264" y1="345" x2="372" y2="419" stroke="#fb923c" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- Amygdala -->
<g filter="url(#cardShadow)">
  <rect x="8" y="385" width="256" height="55" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#f87171" stroke-width="1"/>
  <text x="20" y="403" fill="#f87171" font-size="11.5" font-weight="700">Amygdala</text>
  <text x="20" y="418" fill="#e2e8f0" font-size="8.5">Emotional tagging: attach +/− valence to memories</text>
  <text x="20" y="432" fill="#c4b5fd" font-size="7.5">engram: EmotionalAccumulator</text>
  <text x="20" y="437" fill="#c4b5fd" font-size="6.5">  record_emotion(domain, ±valence) → get_all_trends()</text>
</g>
<line x1="264" y1="412" x2="633" y2="473" stroke="#f87171" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- Temporal -->
<g filter="url(#cardShadow)">
  <rect x="8" y="452" width="256" height="55" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#22d3ee" stroke-width="1"/>
  <text x="20" y="470" fill="#22d3ee" font-size="11.5" font-weight="700">Temporal Association Cortex</text>
  <text x="20" y="485" fill="#e2e8f0" font-size="8.5">Semantic categorization: auto-extract named entities</text>
  <text x="20" y="499" fill="#c4b5fd" font-size="7.5">engram: EntityExtractor (Aho-Corasick)</text>
  <text x="20" y="504" fill="#c4b5fd" font-size="6.5">  extract() → [Person, Project, Tech, Concept]</text>
</g>
<line x1="264" y1="479" x2="576" y2="534" stroke="#22d3ee" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- VTA -->
<g filter="url(#cardShadow)">
  <rect x="8" y="519" width="256" height="55" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#fbbf24" stroke-width="1"/>
  <text x="20" y="537" fill="#fbbf24" font-size="11.5" font-weight="700">Ventral Tegmental Area (VTA)</text>
  <text x="20" y="552" fill="#e2e8f0" font-size="8.5">Reward signal: reinforce or suppress memories</text>
  <text x="20" y="566" fill="#c4b5fd" font-size="7.5">engram: Memory.reward(feedback, n)</text>
  <text x="20" y="571" fill="#c4b5fd" font-size="6.5">  positive = additive boost / negative = multiplicative decay</text>
</g>
<line x1="264" y1="546" x2="726" y2="478" stroke="#fbbf24" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- LC -->
<g filter="url(#cardShadow)">
  <rect x="8" y="586" width="256" height="55" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#2dd4bf" stroke-width="1"/>
  <text x="20" y="604" fill="#2dd4bf" font-size="11.5" font-weight="700">Locus Coeruleus (LC)</text>
  <text x="20" y="619" fill="#e2e8f0" font-size="8.5">Alertness system: detect unexpected / novel events</text>
  <text x="20" y="633" fill="#c4b5fd" font-size="7.5">engram: AnomalyDetector</text>
  <text x="20" y="638" fill="#c4b5fd" font-size="6.5">  z_score() → is_anomaly(σ=2.0) / is_high_anomaly(σ=3.0)</text>
</g>
<line x1="264" y1="613" x2="786" y2="528" stroke="#2dd4bf" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

