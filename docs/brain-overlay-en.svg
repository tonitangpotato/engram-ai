  <text x="1147" y="313" fill="#e2e8f0" font-size="8.5">Associative memory: co-recalled memories auto-link</text>
  <text x="1147" y="327" fill="#c4b5fd" font-size="7.5">engram: HebbianLearning</text>
  <text x="1147" y="337" fill="#c4b5fd" font-size="6.5">  record_coactivation() + discover_cross_links()</text>
</g>

<!-- Core API card -->
<g filter="url(#cardShadow)">
