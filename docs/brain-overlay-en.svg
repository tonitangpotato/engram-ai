  <text x="1147" y="163" fill="#e2e8f0" font-size="8.5">Memory retrieval: query → rank by activation → return</text>
  <text x="1147" y="177" fill="#c4b5fd" font-size="7.5">engram: adaptive_hybrid_search()</text>
  <text x="1147" y="187" fill="#c4b5fd" font-size="6.5">  ACT-R base_level + spreading_activation + Jaccard adaptive weights</text>
</g>
<line x1="1135" y1="161" x2="720" y2="396" stroke="#4dc9f6" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- Hippocampus -->
<g filter="url(#cardShadow)">
  <rect x="1135" y="205" width="262" height="62" rx="6" fill="#0c0b14" fill-opacity="0.97" stroke="#34d399" stroke-width="1"/>
  <text x="1147" y="223" fill="#34d399" font-size="11.5" font-weight="700">Hippocampus</text>
  <text x="1147" y="238" fill="#e2e8f0" font-size="8.5">Consolidation: short-term → reinforced → permanent</text>
  <text x="1147" y="252" fill="#c4b5fd" font-size="7.5">engram: consolidate() — Murre dual-trace model</text>
  <text x="1147" y="262" fill="#c4b5fd" font-size="6.5">  working trace (μ₁=0.15/d) → core trace (μ₂=0.005/d)</text>
</g>
<line x1="1135" y1="240" x2="774" y2="428" stroke="#34d399" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,2"/>

<!-- Synapses -->
<g filter="url(#cardShadow)">
