  <text x="1147" y="518" fill="#e879f9" font-size="11.5" font-weight="700">Cerebellum</text>
  <text x="1147" y="533" fill="#e2e8f0" font-size="8.5">Skill automation: learn behavioral patterns from experience</text>
  <text x="1147" y="547" fill="#c4b5fd" font-size="7.5">engram: auto_skill_generation (SKM integration)</text>
