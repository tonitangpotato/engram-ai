  <line x1="1147" y1="384" x2="1385" y2="384" stroke="#818cf8" stroke-width="0.3" opacity="0.4"/>
  <text x="1152" y="400" fill="#e2e8f0" font-size="8">.add()  .recall()  .recall_recent()</text>
  <text x="1152" y="414" fill="#e2e8f0" font-size="8">.consolidate()  .forget()  .reward()</text>
  <text x="1152" y="428" fill="#e2e8f0" font-size="8">.downscale()  .pin()  .stats()</text>
  <text x="1152" y="442" fill="#e2e8f0" font-size="8">.add_with_emotion()  .add_to_namespace()</text>
  <text x="1152" y="456" fill="#e2e8f0" font-size="8">.recall_from_namespace()</text>
  <line x1="1147" y1="462" x2="1385" y2="462" stroke="#818cf8" stroke-width="0.3" opacity="0.4"/>
  <text x="1152" y="476" fill="#94a3b8" font-size="7">embed()  embed_batch() — multi-model vectorization</text>
</g>

<!-- Cerebellum -->
<g filter="url(#cardShadow)">
