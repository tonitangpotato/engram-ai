  <text x="1147" y="80" fill="#a78bfa" font-size="11.5" font-weight="700">Neocortex</text>
  <text x="1147" y="95" fill="#e2e8f0" font-size="8.5">Permanent long-term memory storage</text>
  <text x="1147" y="109" fill="#c4b5fd" font-size="7.5">engram: SQLite + FTS5 full-text + vector index</text>
</g>
